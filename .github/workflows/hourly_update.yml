name: Hourly City Health Data Update

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Grant permission to commit changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data fetch pipeline
        run: |
          python scripts/fetch_health.py
          python scripts/inject_states.py
          python scripts/expand_metadata.py
          python scripts/news_fetcher.py
          python scripts/build_site.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/city_health.csv docs/ templates/
          git commit -m "Auto-update: Refresh data and rebuild site [skip ci]" || echo "No changes to commit"
          git push
