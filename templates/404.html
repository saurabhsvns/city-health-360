{% extends "layout.html" %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-24 px-4 sm:px-6 lg:px-8">
    <div
        class="max-w-md w-full space-y-8 glass-card p-10 rounded-3xl text-center border-t border-white/10 shadow-2xl relative overflow-hidden group">
        <!-- Background Glow -->
        <div
            class="absolute inset-0 bg-gradient-to-br from-rose-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700">
        </div>

        <!-- 404 Header Text -->
        <div>
            <h1
                class="text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-rose-600 mb-4 animate-pulse-slow">
                404
            </h1>
            <h2 class="text-3xl font-display font-bold text-slate-100 mb-4">
                Data Off The Radar
            </h2>
            <p class="text-slate-400 text-lg mb-8 leading-relaxed">
                We couldn't track down the location you are looking for. The city might be spelled incorrectly or isn't
                part of our system yet.
            </p>
        </div>

        <!-- Call to Action -->
        <div>
            <a href="/"
                class="inline-flex items-center justify-center px-8 py-4 border border-transparent text-base font-semibold rounded-xl text-white bg-brand-500 hover:bg-brand-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all shadow-lg hover:shadow-brand-500/25 w-full sm:w-auto">
                <svg class="w-5 h-5 mr-2 -ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
