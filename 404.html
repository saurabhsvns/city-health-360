    <!-- Scripts -->
    <script>
        // Population of the City Dropdown
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Fetch the latest scores which has the city list
                const response = await fetch('../docs/data/latest_scores.json');
                if (!response.ok) throw new Error('Data fetch failed');
                const citiesData = await response.json();

                // Sort alphabetically by city name
                citiesData.sort((a, b) => a.city.localeCompare(b.city));

                const selector = document.getElementById('city-selector');

                // The current page filename to select the current city
                const currentFile = window.location.pathname.split('/').pop();

                citiesData.forEach(cityData => {
                    const slug = cityData.city.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                    const fileName = `${slug}.html`;

                    const option = document.createElement('option');
                    option.value = fileName;
                    option.textContent = cityData.city;

                    // Mark as selected if we are currently on this page
                    if (currentFile === fileName) {
                        option.selected = true;
                    }

                    selector.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading city dropdown:', error);
            }
        });

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
